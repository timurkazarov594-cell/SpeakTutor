kind = "web"
previewPath = "/lookmax/"
title = "LookMax AI"
version = "1.0.0"
id = "artifacts/lookmax"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/lookmax/" ]
localPort = 21612

[services.development]
run = "pnpm --filter @workspace/lookmax run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lookmax", "run", "build" ]
publicDir = "artifacts/lookmax/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21612"
BASE_PATH = "/lookmax/"
