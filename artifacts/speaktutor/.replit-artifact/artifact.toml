kind = "web"
previewPath = "/speaktutor/"
title = "SpeakTutor AI"
version = "1.0.0"
id = "artifacts/speaktutor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/speaktutor/" ]
localPort = 22089

[services.development]
run = "pnpm --filter @workspace/speaktutor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/speaktutor", "run", "build" ]
publicDir = "artifacts/speaktutor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22089"
BASE_PATH = "/speaktutor/"
