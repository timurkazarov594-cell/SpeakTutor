          type: string
        level:
          type: string
          description: "beginner | intermediate | advanced"
      required:
        - scenarioId

    TutorSessionEnd:
      type: object
      properties:
        durationSeconds:
          type: integer

    TutorMessage:
      type: object
      properties:
        id:
          type: integer
        role:
          type: string
          description: "user | assistant"
        text:
          type: string
        audioUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        correction:
          $ref: "#/components/schemas/TutorCorrection"
      required:
        - id
        - role
        - text
        - createdAt

    TutorCorrection:
      type: object
      properties:
        originalText:
          type: string
        correctedText:
          type: string
        grammarMistakes:
          type: array
          items:
            type: string
        vocabularyMistakes:
          type: array
          items:
            type: string
        pronunciationWarnings:
          type: array
          items:
            type: string
        nativeSpeakerVersion:
          type: string
        explanationRu:
          type: string
          description: Explanation in Russian
        score:
          type: number
          description: 1-10
      required:
        - originalText
        - correctedText
        - grammarMistakes
        - vocabularyMistakes
        - pronunciationWarnings
        - nativeSpeakerVersion
        - explanationRu
        - score

    TutorSessionDetail:
      type: object
      properties:
        session:
          $ref: "#/components/schemas/TutorSession"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/TutorMessage"
      required:
        - session
        - messages

    TutorMessageInput:
      type: object
      properties:
        text:
          type: string
          description: User's spoken text (after transcription)
        audioBase64:
          type: ["string", "null"]
          description: Optional base64 audio for transcription
      required:
        - text

    TutorMessageInfo:
      type: object
      properties:
        userMessagesUsed:
          type: integer
        userMessagesTotal:
          type: integer
        userMessagesRemaining:
          type: integer
      required:
        - userMessagesUsed
        - userMessagesTotal
        - userMessagesRemaining

    TutorMessageResponse:
      type: object
      properties:
        userMessage:
          $ref: "#/components/schemas/TutorMessage"
        assistantMessage:
          $ref: "#/components/schemas/TutorMessage"
        correction:
          $ref: "#/components/schemas/TutorCorrection"
        xpEarned:
          type: integer
        messageInfo:
          $ref: "#/components/schemas/TutorMessageInfo"
          nullable: true
      required:
        - userMessage
        - assistantMessage
        - correction
        - xpEarned

    TranscribeInput:
      type: object
      properties:
        audioBase64:
          type: string
