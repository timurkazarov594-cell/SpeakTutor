        mimeType:
          type: string
          description: "audio/webm or audio/wav"
      required:
        - audioBase64
        - mimeType

    TranscribeResult:
      type: object
      properties:
        text:
          type: string
        confidence:
          type: ["number", "null"]
          description: 0-1 confidence score
        words:
          type: array
          description: Word-level confidence if available
          items:
            type: object
            properties:
              word:
                type: string
              confidence:
                type: number
            required: [word, confidence]
      required:
        - text

    TtsInput:
      type: object
      properties:
        text:
          type: string
        voice:
          type: string
          description: "alloy | echo | fable | onyx | nova | shimmer"
      required:
        - text

    TtsResult:
      type: object
      properties:
        audioBase64:
          type: string
          description: Base64 MP3 audio
      required:
        - audioBase64

    TutorAchievement:
      type: object
      properties:
        id:
          type: integer
        badgeName:
          type: string
        titleRu:
          type: string
        descriptionRu:
          type: string
        emoji:
          type: string
        unlockedAt:
          type: ["string", "null"]
          format: date-time
        isUnlocked:
          type: boolean
        xpReward:
          type: integer
      required:
        - id
        - badgeName
        - titleRu
        - descriptionRu
        - emoji
        - isUnlocked
        - xpReward

    TutorWord:
      type: object
      properties:
        id:
          type: integer
        word:
          type: string
        translation:
          type: string
          description: Russian translation
        exampleSentence:
          type: ["string", "null"]
        isMastered:
          type: boolean
        timesSeenWrong:
          type: integer
        addedAt:
          type: string
          format: date-time
      required:
        - id
        - word
        - translation
        - isMastered
        - timesSeenWrong
        - addedAt

    TutorWordInput:
      type: object
      properties:
        word:
          type: string
        translation:
          type: string
        exampleSentence:
          type: string
      required:
        - word
        - translation

    TutorAnalytics:
      type: object
      properties:
        weeklyProgress:
          type: array
          items:
            type: object
            properties:
              week:
                type: string
              grammarScore:
                type: number
              vocabularyScore:
                type: number
              pronunciationScore:
                type: number
              speakingMinutes:
                type: integer
              sessionsCount:
                type: integer
            required: [week, grammarScore, vocabularyScore, pronunciationScore, speakingMinutes, sessionsCount]
        errorFrequency:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              count:
                type: integer
              percentage:
                type: number
            required: [category, count, percentage]
        vocabularyGrowth:
          type: array
          items:
            type: object
            properties:
              month:
                type: string
              wordsLearned:
                type: integer
            required: [month, wordsLearned]
        totalStats:
          type: object
          properties:
            totalSessions:
              type: integer
            totalMinutes:
              type: integer
            totalWords:
              type: integer
            averageScore:
              type: number
          required: [totalSessions, totalMinutes, totalWords, averageScore]
      required:
        - weeklyProgress
        - errorFrequency
        - vocabularyGrowth
        - totalStats
